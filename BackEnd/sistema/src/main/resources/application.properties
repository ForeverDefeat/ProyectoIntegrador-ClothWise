# ================================================================
# ClothWise — application.properties
# Perfil: desarrollo local / pruebas de backend
# ================================================================


# ----------------------------------------------------------------
# SERVIDOR
# ----------------------------------------------------------------
server.port=8080
server.servlet.context-path=/


# ----------------------------------------------------------------
# BASE DE DATOS — MySQL local
# Crear la base de datos antes de arrancar:
#   CREATE DATABASE inventario_omg CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
# ----------------------------------------------------------------
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/inventario_omg?useSSL=false&serverTimezone=America/Lima&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:RODRIGO30JA}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ----------------------------------------------------------------
# HIKARI — pool de conexiones
# ----------------------------------------------------------------
spring.datasource.hikari.pool-name=ClothWise-Pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000


# ----------------------------------------------------------------
# JPA / HIBERNATE
# create-drop : crea las tablas al arrancar y las borra al parar.
#               Útil para pruebas rápidas sin Flyway.
# update      : actualiza el esquema sin borrar datos.
#               Usar cuando ya tengas datos de prueba.
# validate    : solo valida que el esquema coincide con las entidades.
#               Usar cuando Flyway gestiona el esquema (producción).
# ----------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false


# ----------------------------------------------------------------
# FLYWAY — migraciones versionadas
# Desactivado en desarrollo (ddl-auto=create-drop lo gestiona).
# Activar en staging/producción cambiando a true y ddl-auto=validate.
# ----------------------------------------------------------------
spring.flyway.enabled=false
# spring.flyway.locations=classpath:db/migration
# spring.flyway.baseline-on-migrate=true


# ----------------------------------------------------------------
# JWT — seguridad
# IMPORTANTE: cambiar el secret en producción por uno de al menos
# 32 caracteres generado aleatoriamente. Nunca commitear el secret real.
# ----------------------------------------------------------------
jwt.secret=${JWT_SECRET:ClothWise_Dev_Secret_Key_2024_omgmoda_ica_peru}
jwt.expiracion-horas=${JWT_EXPIRACION_HORAS:8}

# ----------------------------------------------------------------
# JACKSON — reemplaza el bloque actual en application.properties
# Spring Boot 4.x / Jackson 3.x — sin ObjectMapperConfig personalizado
# ----------------------------------------------------------------
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=America/Lima

# ----------------------------------------------------------------
# LOGGING — nivel de detalle en desarrollo
# ----------------------------------------------------------------
logging.level.root=INFO
logging.level.com.omgmoda=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE


# ----------------------------------------------------------------
# ACTUATOR — endpoints de salud (opcional para pruebas)
# Acceso: GET http://localhost:8080/actuator/health
# ----------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always


# ----------------------------------------------------------------
# OPENAPI / SWAGGER UI
# Documentacion interactiva:
#   UI   : http://localhost:8080/swagger-ui.html
#   JSON : http://localhost:8080/v3/api-docs
# ----------------------------------------------------------------
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha


# ----------------------------------------------------------------
# CORS — orígenes permitidos (complementa SecurityConfig.java)
# ----------------------------------------------------------------
spring.web.cors.allowed-origins=http://localhost:5173

# ----------------------------------------------------------------
# UPLOADS - imagenes de productos
# ----------------------------------------------------------------
clothwise.uploads.productos-dir=uploads/productos
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
